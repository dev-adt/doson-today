<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizHub — Cài đặt AI Provider</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sb-logo"><div class="sb-logo-icon"><i class="ti ti-building-community"></i></div><div><div class="sb-logo-name">BizHub</div><div class="sb-logo-sub">Hội viên doanh nghiệp</div></div></div>
    <div class="sb-sec" data-i18n="menu_manage">Quản lý</div>
    <a href="index.html" class="sb-item"><i class="ti ti-layout-dashboard"></i> <span>Tổng quan</span></a>
    <a href="members.html" class="sb-item"><i class="ti ti-users"></i> <span>Hội viên</span></a>
    <a href="posts.html" class="sb-item"><i class="ti ti-news"></i> <span>Bài viết</span></a>
    <a href="register.html" class="sb-item"><i class="ti ti-user-plus"></i> <span>Đăng ký</span></a>
    <a href="admin.html" class="sb-item"><i class="ti ti-shield-check"></i> <span>Duyệt hội viên</span></a>
    <a href="ai-chat.html" class="sb-item"><i class="ti ti-robot"></i> <span>Trợ lý AI</span></a>
    <div class="sb-sec">Hệ thống</div>
    <a href="provider-config.html" class="sb-item active"><i class="ti ti-settings"></i> <span>Cài đặt AI</span></a>
    <div class="lang-section">
      <div class="lang-label">NGÔN NGỮ</div>
      <div class="lang-grid">
        <button class="lb active" onclick="setLang('vi')">🇻🇳 VI</button>
        <button class="lb" onclick="setLang('en')">🇺🇸 EN</button>
        <button class="lb" onclick="setLang('zh')">🇨🇳 ZH</button>
        <button class="lb" onclick="setLang('ja')">🇯🇵 JA</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="tb-title"><i class="ti ti-settings" style="color:#185FA5"></i> Cài đặt AI Provider</div>
      <div class="tb-right"><div class="av-sm">AD</div></div>
    </div>
    <div class="content">
      <div id="status-bar" style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:1rem;background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-muted)">
        <i class="ti ti-info-circle"></i> <span id="status-text">Chưa cấu hình. Chọn một provider bên dưới.</span>
      </div>

      <div class="provider-grid" id="provider-grid"></div>

      <div id="config-section" style="display:none">
        <div class="card" style="margin-bottom:10px">
          <div class="card-header"><div class="card-title" id="cfg-title"><i class="ti ti-key"></i> Cấu hình</div></div>
          <div style="padding:1rem">
            <div class="fg">
              <label>API Key <span class="req">*</span></label>
              <div style="position:relative">
                <input type="password" id="api-key-input" placeholder="Dán API key vào đây..." style="padding-right:36px">
                <button onclick="toggleKey()" style="position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px"><i class="ti ti-eye" id="eye-icon"></i></button>
              </div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:3px" id="key-link"></div>
            </div>
            <div class="fg" id="base-url-group" style="display:none">
              <label>Base URL</label>
              <input type="text" id="base-url-input" value="http://localhost:11434">
            </div>
            <div class="fg">
              <label>Model đang chọn</label>
              <div style="padding:7px 10px;border-radius:8px;background:var(--surface-1);border:0.5px solid var(--border);font-size:12px;color:var(--text-secondary);font-family:monospace" id="model-display">—</div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-bottom:10px">
          <div class="card-header"><div class="card-title"><i class="ti ti-flask"></i> Kiểm tra kết nối</div></div>
          <div style="padding:1rem">
            <div style="display:flex;gap:8px;margin-bottom:8px">
              <input type="text" id="test-q" value="Xin chào! Giới thiệu về BizHub và danh sách hội viên." style="flex:1">
              <button class="btn btn-primary" id="test-btn" onclick="testConn()"><i class="ti ti-send"></i> Gửi thử</button>
            </div>
            <div id="test-result" style="background:var(--surface-1);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text-secondary);min-height:44px;line-height:1.6">
              Nhấn "Gửi thử" để kiểm tra kết nối.
            </div>
            <div id="test-meta" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px"></div>
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button class="btn" onclick="resetCfg()"><i class="ti ti-refresh"></i> Đặt lại</button>
          <button class="btn btn-primary" onclick="saveCfg()"><i class="ti ti-device-floppy"></i> Lưu và áp dụng</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script>
const PROVIDERS = [
  {id:'anthropic',name:'Anthropic',tag:'Claude — Được khuyến nghị',logo:'🟠',logoBg:'#FFF4ED',logoBg2:'#FFE8D6',selColor:'#C45200',keyLink:'<a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>',baseUrl:false,models:[{id:'claude-sonnet-4-6',label:'Claude Sonnet 4.6',tags:['smart','fast']},{id:'claude-opus-4-6',label:'Claude Opus 4.6',tags:['smart']},{id:'claude-haiku-4-5-20251001',label:'Claude Haiku 4.5',tags:['fast','cheap']}],price:'$3–15/1M tokens',recommended:true},
  {id:'openai',name:'OpenAI',tag:'GPT — Phổ biến nhất',logo:'🟢',logoBg:'#EDFAF5',logoBg2:'#D4F5E9',selColor:'#0A7C52',keyLink:'<a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a>',baseUrl:false,models:[{id:'gpt-4o',label:'GPT-4o',tags:['smart']},{id:'gpt-4o-mini',label:'GPT-4o mini',tags:['fast','cheap']},{id:'gpt-4-turbo',label:'GPT-4 Turbo',tags:['smart']}],price:'$0.15–30/1M tokens'},
  {id:'gemini',name:'Google Gemini',tag:'Gemini — Đa phương thức',logo:'🔵',logoBg:'#EAF2FF',logoBg2:'#D2E3FC',selColor:'#1A73E8',keyLink:'<a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>',baseUrl:false,models:[{id:'gemini-2.0-flash',label:'Gemini 2.0 Flash',tags:['fast','free']},{id:'gemini-1.5-pro',label:'Gemini 1.5 Pro',tags:['smart']},{id:'gemini-1.5-flash',label:'Gemini 1.5 Flash',tags:['fast']}],price:'Miễn phí — $7/1M tokens'},
  {id:'deepseek',name:'DeepSeek',tag:'DeepSeek — Giá rẻ, mạnh',logo:'🔷',logoBg:'#EEF2FF',logoBg2:'#E0E7FF',selColor:'#4338CA',keyLink:'<a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a>',baseUrl:false,models:[{id:'deepseek-chat',label:'DeepSeek V3',tags:['smart','cheap']},{id:'deepseek-reasoner',label:'DeepSeek R1',tags:['smart']}],price:'$0.27–1.10/1M tokens'},
  {id:'openrouter',name:'OpenRouter',tag:'200+ models — 1 API key',logo:'🔀',logoBg:'#F3F0FF',logoBg2:'#EDE9FE',selColor:'#6D28D9',keyLink:'<a href="https://openrouter.ai/keys" target="_blank">openrouter.ai</a>',baseUrl:false,models:[{id:'google/gemini-2.0-flash-001',label:'Gemini 2.0 Flash',tags:['fast','free']},{id:'anthropic/claude-sonnet-4-6',label:'Claude Sonnet 4.6',tags:['smart']},{id:'deepseek/deepseek-chat-v3-0324:free',label:'DeepSeek V3 (Free)',tags:['free']},{id:'meta-llama/llama-3.3-70b-instruct:free',label:'Llama 3.3 70B',tags:['free']}],price:'Tuỳ model — có free'},
  {id:'ollama',name:'Ollama / Local',tag:'Chạy local — Miễn phí',logo:'🦙',logoBg:'#F0FDF4',logoBg2:'#DCFCE7',selColor:'#166534',keyLink:'Cài <a href="https://ollama.ai" target="_blank">ollama.ai</a> rồi chạy <code>ollama serve</code>',baseUrl:true,models:[{id:'llama3.2',label:'Llama 3.2',tags:['free']},{id:'mistral',label:'Mistral 7B',tags:['free','fast']},{id:'qwen2.5',label:'Qwen 2.5',tags:['free']},{id:'gemma3',label:'Gemma 3',tags:['free']}],price:'Hoàn toàn miễn phí'},
];
const TAG_CLS={smart:'tag-smart',fast:'tag-fast',free:'tag-free',cheap:'tag-cheap'};
const TAG_LBL={smart:'Thông minh',fast:'Nhanh',free:'Miễn phí',cheap:'Rẻ'};

let selProvider=null, selModel=null;

function renderProviders(){
  const g=document.getElementById('provider-grid');
  g.innerHTML=PROVIDERS.map(p=>`
    <div class="pcard${p.recommended?' recommended':''}" id="pc-${p.id}" onclick="selectProvider('${p.id}')" style="${p.recommended?'border-color:'+p.selColor:''}">
      ${p.recommended?`<div style="position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:${p.selColor};color:#fff;font-size:10px;font-weight:500;padding:2px 10px;border-radius:99px;white-space:nowrap">Khuyến nghị</div>`:''}
      <div class="pcard-logo" style="background:${p.logoBg}">${p.logo}</div>
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-tagline">${p.tag}</div>
      <div style="margin:8px 0" id="models-${p.id}">
        ${p.models.map((m,i)=>`<div class="model-opt${i===0?' active':''}" id="mo-${p.id}-${i}" onclick="event.stopPropagation();selectModel('${p.id}',${i})">
          <div class="model-dot"></div>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${m.label}</span>
          ${m.tags.map(t=>`<span class="model-tag ${TAG_CLS[t]||''}">${TAG_LBL[t]||t}</span>`).join('')}
        </div>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--text-muted);border-top:0.5px solid var(--border);padding-top:6px;margin-top:2px">${p.price}</div>
    </div>`).join('');
  // highlight saved config
  const saved = window.getAIConfig();
  const sp = PROVIDERS.find(p=>p.id===saved.provider);
  if(sp) selectProvider(saved.provider, true);
}

function selectProvider(id, silent=false){
  selProvider = PROVIDERS.find(p=>p.id===id);
  selModel = selProvider.models[0];
  document.querySelectorAll('.pcard').forEach(el=>el.classList.remove('selected'));
  document.getElementById('pc-'+id).classList.add('selected');
  document.getElementById('config-section').style.display='block';
  document.getElementById('cfg-title').innerHTML=`<span style="font-size:15px">${selProvider.logo}</span> Cấu hình ${selProvider.name}`;
  document.getElementById('key-link').innerHTML=`<i class="ti ti-external-link" style="font-size:11px"></i> Lấy key tại: ${selProvider.keyLink}`;
  document.getElementById('base-url-group').style.display=selProvider.baseUrl?'flex':'none';
  document.getElementById('model-display').textContent=selModel.id;
  document.getElementById('test-result').textContent='Nhấn "Gửi thử" để kiểm tra kết nối.';
  document.getElementById('test-result').style.cssText='';
  document.getElementById('test-meta').innerHTML='';
  if(!silent) {
    const saved=window.getAIConfig();
    if(saved.provider===id) document.getElementById('api-key-input').value='(key đã lưu)';
    else document.getElementById('api-key-input').value='';
  }
  updateStatus('warn',`Đã chọn ${selProvider.name} — nhập API key và lưu cấu hình.`,'#FAEEDA','#633806');
}

function selectModel(pid,idx){
  const p=PROVIDERS.find(x=>x.id===pid);
  document.querySelectorAll(`#models-${pid} .model-opt`).forEach((el,i)=>el.classList.toggle('active',i===idx));
  if(selProvider&&selProvider.id===pid){ selModel=p.models[idx]; document.getElementById('model-display').textContent=selModel.id; }
}

function toggleKey(){
  const inp=document.getElementById('api-key-input');
  const ic=document.getElementById('eye-icon');
  if(inp.type==='password'){inp.type='text';ic.className='ti ti-eye-off';}
  else{inp.type='password';ic.className='ti ti-eye';}
}

async function testConn(){
  if(!selProvider){alert('Chọn provider trước.');return;}
  const key=document.getElementById('api-key-input').value.trim();
  const q=document.getElementById('test-q').value.trim()||'Xin chào!';
  const btn=document.getElementById('test-btn');
  const res=document.getElementById('test-result');
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader"></i> Đang gọi...';
  res.style.cssText=''; res.textContent='Đang kết nối tới '+selProvider.name+'...';
  document.getElementById('test-meta').innerHTML='';
  const t0=Date.now();
  try{
    // Gọi qua backend proxy
    const r = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({provider:selProvider.id,model:selModel.id,system:'Bạn là trợ lý BizHub.',messages:[{role:'user',content:q}]})
    });
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'HTTP '+r.status);
    const elapsed=((Date.now()-t0)/1000).toFixed(1);
    res.style.cssText='background:#EAF3DE;border:0.5px solid #97C459;color:#27500A';
    res.textContent=d.text;
    document.getElementById('test-meta').innerHTML=`
      <span style="font-size:11px;padding:2px 8px;border-radius:99px;background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-muted)"><i class="ti ti-clock" style="font-size:11px"></i> ${elapsed}s</span>
      ${d.usage?.input?`<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-muted)">↑ ${d.usage.input} tokens</span>`:''}
      ${d.usage?.output?`<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-muted)">↓ ${d.usage.output} tokens</span>`:''}
      <span style="font-size:11px;padding:2px 8px;border-radius:99px;background:#EAF3DE;border:0.5px solid #97C459;color:#27500A"><i class="ti ti-circle-check" style="font-size:11px"></i> Kết nối thành công</span>`;
    updateStatus('ok','Kết nối thành công với '+selProvider.name+' — '+selModel.label,'#EAF3DE','#27500A');
  }catch(e){
    res.style.cssText='background:#FCEBEB;border:0.5px solid #F09595;color:#791F1F';
    res.textContent='Lỗi: '+e.message;
    document.getElementById('test-meta').innerHTML=`<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:#FCEBEB;border:0.5px solid #F09595;color:#791F1F"><i class="ti ti-circle-x" style="font-size:11px"></i> Kết nối thất bại</span>`;
    updateStatus('err','Kết nối thất bại — kiểm tra lại API key.','#FCEBEB','#791F1F');
  }
  btn.disabled=false; btn.innerHTML='<i class="ti ti-send"></i> Gửi thử';
}

function saveCfg(){
  if(!selProvider){alert('Chọn provider trước.');return;}
  window.setAIConfig({provider:selProvider.id,model:selModel.id});
  updateStatus('ok','Đã lưu — BizHub AI đang dùng '+selProvider.name+' / '+selModel.label,'#EAF3DE','#27500A');
  showToast('Đã lưu cấu hình AI!','success');
}

function resetCfg(){
  selProvider=null; selModel=null;
  document.querySelectorAll('.pcard').forEach(el=>el.classList.remove('selected'));
  document.getElementById('config-section').style.display='none';
  document.getElementById('api-key-input').value='';
  updateStatus('none','Chưa cấu hình. Chọn một provider để bắt đầu.','var(--surface-1)','var(--text-muted)');
}

function updateStatus(type,msg,bg,color){
  const el=document.getElementById('status-bar');
  el.style.cssText=`display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:1rem;background:${bg};border:0.5px solid ${color};color:${color}`;
  const icons={ok:'ti-circle-check',warn:'ti-alert-triangle',err:'ti-circle-x',none:'ti-info-circle'};
  document.getElementById('status-text').parentElement.innerHTML=`<i class="ti ${icons[type]||'ti-info-circle'}"></i> <span>${msg}</span>`;
}

renderProviders();
</script>
</body>
</html>

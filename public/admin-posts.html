<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizHub — Bài viết</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css?v=2.0">
</head>
<body class="light-theme">
<div class="shell">
  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <a href="admin-dashboard.html" class="sb-logo" style="text-decoration:none">
      <div class="sb-logo-icon"><i class="ti ti-building-community"></i></div>
      <div>
        <div class="sb-logo-name">BizHub</div>
        <div class="sb-logo-sub">Hội viên doanh nghiệp</div>
      </div>
    </a>
    
    <div class="sb-search">
      <div class="sb-sw">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Tìm kiếm...">
      </div>
    </div>
    
    <div class="sb-sec">Quản trị</div>
    <a href="admin-dashboard.html" class="sb-item"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a href="admin-members.html" class="sb-item"><i class="ti ti-users"></i> Duyệt hội viên <span class="sb-badge" id="sb-badge-members">0</span></a>
    <a href="admin-posts.html" class="sb-item active"><i class="ti ti-clipboard-check"></i> Duyệt bài viết <span class="sb-badge" id="sb-badge-posts">0</span></a>
    <div class="sb-sec">Hệ thống</div>
    <a href="admin-config.html" class="sb-item"><i class="ti ti-settings"></i> Cấu hình AI</a>
    <a href="index.html" class="sb-item" target="_blank"><i class="ti ti-external-link"></i> Xem Trang chủ</a>
    
    <div class="lang-section">
      <div class="lang-label">Ngôn ngữ</div>
      <div class="lang-grid">
        <button class="lb active">🇻🇳 VI</button>
        <button class="lb" onclick="alert('Đã chọn Tiếng Anh')">🇺🇸 EN</button>
      </div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="tb-title"><i class="ti ti-news" style="color:#185FA5"></i> Quản lý bài viết</div>
      <div class="tb-center"><div class="tb-search-wrap"><i class="ti ti-search"></i><input type="text" id="main-search" placeholder="Tìm bài viết..." oninput="filterPosts(this.value)"><div class="search-dropdown" id="main-results"></div></div></div>
      <div class="tb-right"><div class="lang-pill" onclick="toggleLangDrop()"><span id="cur-flag">🇻🇳</span> <span id="cur-lang">VI</span> <i class="ti ti-chevron-down"></i><div class="lang-drop" id="lang-drop"><div class="ld-item active" onclick="setLang('vi')">🇻🇳 Tiếng Việt <i class="ti ti-check"></i></div><div class="ld-item" onclick="setLang('en')">🇺🇸 English <i class="ti ti-check"></i></div><div class="ld-item" onclick="setLang('zh')">🇨🇳 中文 <i class="ti ti-check"></i></div><div class="ld-item" onclick="setLang('ja')">🇯🇵 日本語 <i class="ti ti-check"></i></div></div></div><div class="av-sm">AD</div></div>
    </div>
    <div class="content">
      <div class="tabs">
        <div class="tab active" onclick="filterTab('all',this)">Tất cả (<span id="cnt-all">0</span>)</div>
        <div class="tab" onclick="filterTab('pending',this)">Chờ duyệt (<span id="cnt-p">0</span>)</div>
        <div class="tab" onclick="filterTab('approved',this)">Đã xuất bản (<span id="cnt-a">0</span>)</div>
      </div>
      <div id="posts-list"></div>
    </div>
  </div>
</div>

<!-- Modal xem bài -->
<div id="post-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem">
  <div style="background:var(--surface-2);border-radius:14px;border:0.5px solid var(--border);width:100%;max-width:560px;max-height:80vh;overflow-y:auto">
    <div style="padding:.9rem 1.2rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface-2)">
      <div style="font-size:14px;font-weight:500" id="modal-title">Chi tiết bài viết</div>
      <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted)"><i class="ti ti-x"></i></button>
    </div>
    <div style="padding:1.2rem" id="modal-body"></div>
    <div style="padding:.85rem 1.2rem;border-top:0.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end" id="modal-footer"></div>
  </div>
</div>

<script src="js/i18n.js"></script><script src="js/search.js"></script><script src="js/app.js"></script>
<script>
let posts = [];
let tabFilter='all', searchQ='';

const getInitialsColors = (name) => {
  const sum = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
  const colors = [
    { bg: '#E6F1FB', fg: '#0C447C' },
    { bg: '#EAF3DE', fg: '#27500A' },
    { bg: '#FAEEDA', fg: '#633806' },
    { bg: '#EEEDFE', fg: '#3C3489' },
    { bg: '#E1F5EE', fg: '#085041' },
    { bg: '#FAECE7', fg: '#712B13' }
  ];
  return colors[sum % colors.length];
};

async function loadPosts() {
  const token = window.getAuthToken();
  let url = '/api/posts';
  let headers = {};

  if (token) {
    headers = window.authHeaders();
  } else {
    url = '/api/posts?status=approved';
    const pendingTab = document.querySelector('.tab[onclick*="pending"]');
    if (pendingTab) pendingTab.style.display = 'none';
  }

  try {
    const res = await fetch(url, { headers });
    if (!res.ok) {
      if (res.status === 401 && token) {
        window.clearAuthToken();
        window.location.reload();
      }
      throw new Error('Không thể tải danh sách bài viết');
    }
    const data = await res.json();
    posts = data.data.map(p => {
      const colors = p.company_name ? getInitialsColors(p.company_name) : { bg: '#E6F1FB', fg: '#0C447C' };
      return {
        id: p.id,
        memberId: p.member_id,
        company: p.company_name || 'Hội viên ẩn danh',
        initials: p.company_name ? p.company_name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() : 'HV',
        bg: colors.bg,
        fg: colors.fg,
        title: p.title,
        summary: p.summary,
        body: p.body,
        type: p.type || 'Bài viết',
        contact: p.contact_info,
        tags: p.tags ? (typeof p.tags === 'string' ? JSON.parse(p.tags) : p.tags) : [],
        status: p.status,
        date: new Date(p.created_at).toLocaleDateString('vi-VN')
      };
    });
    render();
    updateSidebarBadges();
  } catch (err) {
    console.error(err);
    document.getElementById('posts-list').innerHTML = `<div class="empty"><i class="ti ti-alert-triangle"></i>Lỗi tải dữ liệu: ${err.message}</div>`;
  }
}

async function updateSidebarBadges() {
  try {
    const resMem = await fetch('/api/members?status=pending', { headers: window.authHeaders() });
    if (resMem.ok) {
      const data = await resMem.json();
      const badge = document.getElementById('sb-badge-members');
      if (badge) badge.textContent = data.total || 0;
    }
    const resPost = await fetch('/api/posts?status=pending', { headers: window.authHeaders() });
    if (resPost.ok) {
      const data = await resPost.json();
      const badge = document.getElementById('sb-badge-posts');
      if (badge) badge.textContent = data.data.length || 0;
    }
  } catch {}
}

function updateCounts(){
  document.getElementById('cnt-all').textContent=posts.length;
  const pendingCntEl = document.getElementById('cnt-p');
  if (pendingCntEl) pendingCntEl.textContent=posts.filter(p=>p.status==='pending').length;
  document.getElementById('cnt-a').textContent=posts.filter(p=>p.status==='approved').length;
}

function render(){
  updateCounts();
  const list=posts.filter(p=>{
    if(tabFilter!=='all'&&p.status!==tabFilter) return false;
    if(searchQ&&!p.title.toLowerCase().includes(searchQ)&&!p.company.toLowerCase().includes(searchQ)) return false;
    return true;
  });
  const el=document.getElementById('posts-list');
  if(!list.length){el.innerHTML='<div class="empty"><i class="ti ti-news"></i>Không có bài viết.</div>';return;}
  const token = window.getAuthToken();
  el.innerHTML=list.map(p=>`
    <div class="card" style="margin-bottom:10px">
      <div style="padding:1rem">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div class="av-circle" style="background:${p.bg};color:${p.fg};flex-shrink:0">${p.initials}</div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
              <span style="font-size:12px;font-weight:500">${p.company}</span>
              <span style="font-size:10px;color:var(--text-muted)">· ${p.type} · ${p.date}</span>
              ${window.statusBadge(p.status)}
            </div>
            <div style="font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.4">${p.title}</div>
            <div style="font-size:12px;color:var(--text-secondary);line-height:1.6">${p.summary}</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">
              ${(p.tags||[]).map(t=>`<span style="background:var(--surface-1);border:0.5px solid var(--border);border-radius:99px;font-size:10px;padding:2px 7px;color:var(--text-secondary)">${t}</span>`).join('')}
            </div>
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0;flex-direction:column">
            ${(p.status==='pending' && token)?`<button class="btn btn-approve" style="font-size:11px" onclick="approve(${p.id})"><i class="ti ti-check"></i> Xuất bản</button><button class="btn btn-reject" style="font-size:11px" onclick="reject(${p.id})"><i class="ti ti-x"></i> Từ chối</button>`:''}
            <button class="btn" style="font-size:11px" onclick="viewPost(${p.id})"><i class="ti ti-eye"></i> Đọc bài</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function filterTab(f,el){tabFilter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
function filterPosts(q){searchQ=q.toLowerCase();render();}

async function approve(id){
  const p=posts.find(x=>x.id===id);
  if(!p) return;
  try {
    const res = await fetch(`/api/posts/${id}/approve`, {
      method: 'PATCH',
      headers: window.authHeaders()
    });
    if (!res.ok) throw new Error('Không thể duyệt bài viết');
    p.status='approved';
    showToast('Đã xuất bản bài viết!','success');
    loadPosts();
  } catch (err) {
    alert(err.message);
  }
}

async function reject(id){
  const p=posts.find(x=>x.id===id);
  if(!p) return;
  const reason = prompt('Nhập lý do từ chối bài viết:');
  if (reason === null) return;

  try {
    const res = await fetch(`/api/posts/${id}/reject`, {
      method: 'PATCH',
      headers: window.authHeaders(),
      body: JSON.stringify({ reason })
    });
    if (!res.ok) throw new Error('Không thể từ chối bài viết');
    p.status='rejected';
    showToast('Đã từ chối bài viết.','danger');
    loadPosts();
  } catch (err) {
    alert(err.message);
  }
}

function viewPost(id){
  const p=posts.find(x=>x.id===id);if(!p)return;
  const token = window.getAuthToken();
  document.getElementById('modal-title').textContent=p.title;
  document.getElementById('modal-body').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div class="av-circle" style="background:${p.bg};color:${p.fg}">${p.initials}</div>
      <div><div style="font-weight:500">${p.company}</div><div style="font-size:11px;color:var(--text-muted)">${p.date} · ${p.type} · ${window.statusBadge(p.status)}</div></div>
    </div>
    <div style="font-size:14px;font-weight:500;margin-bottom:6px">${p.title}</div>
    <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;margin-bottom:10px;white-space:pre-line">${p.body}</div>
    ${p.contact?`<div style="padding:9px 12px;background:var(--surface-1);border-radius:8px;font-size:12px;color:var(--text-secondary)"><i class="ti ti-phone" style="font-size:13px;vertical-align:-2px"></i> Liên hệ: <strong>${p.contact}</strong></div>`:''}`;
  
  document.getElementById('modal-footer').innerHTML = (p.status==='pending' && token)
    ?`<button class="btn" onclick="closeModal()">Đóng</button><button class="btn btn-reject" onclick="reject(${p.id});closeModal()"><i class="ti ti-x"></i> Từ chối</button><button class="btn btn-approve" onclick="approve(${p.id});closeModal()"><i class="ti ti-check"></i> Xuất bản ngay</button>`
    :`<button class="btn btn-primary" onclick="closeModal()">Đóng</button>`;
  document.getElementById('post-modal').style.display='flex';
}

function closeModal(){document.getElementById('post-modal').style.display='none';}
document.addEventListener('DOMContentLoaded', async () => {
  const admin = await window.checkAuthOrRedirect();
  if (admin) {
    loadPosts();
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizHub — Đăng nhập hệ thống</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<style>
  body {
    background: radial-gradient(circle at 10% 20%, rgba(24, 95, 165, 0.05) 0%, rgba(255, 255, 255, 0) 90%), var(--surface-0);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .login-container {
    width: 100%;
    max-width: 400px;
    padding: 1rem;
  }
  .glass-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    border-radius: 16px;
    padding: 2.2rem 2rem;
  }
  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
    text-align: center;
  }
  .logo-icon {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    background: var(--blue-bg);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 10px rgba(24, 95, 165, 0.1);
  }
  .logo-name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .input-group {
    position: relative;
    margin-bottom: 1.2rem;
  }
  .input-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .input-wrapper {
    position: relative;
  }
  .input-wrapper input {
    width: 100%;
    padding: 10px 12px 10px 34px;
    border-radius: 8px;
    border: 1px solid var(--border-strong);
    background: var(--surface-2);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    transition: all 0.15s ease;
  }
  .input-wrapper input:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.15);
  }
  .input-wrapper i {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--text-muted);
  }
  .btn-submit {
    width: 100%;
    padding: 10px;
    background: var(--blue);
    color: white;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s ease;
    box-shadow: 0 4px 12px rgba(24, 95, 165, 0.2);
  }
  .btn-submit:hover {
    background: var(--blue-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(24, 95, 165, 0.3);
  }
  .btn-submit:active {
    transform: translateY(0);
  }
  .error-box {
    background: #FCEBEB;
    border: 0.5px solid #F3C3C3;
    color: #A32D2D;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 1.2rem;
    display: none;
    align-items: center;
    gap: 6px;
    line-height: 1.4;
  }
  .footer-text {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1.5rem;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="glass-card">
    <div class="logo-block">
      <div class="logo-icon"><i class="ti ti-building-community"></i></div>
      <div>
        <div class="logo-name">BizHub AI</div>
        <div class="logo-sub">Hệ thống quản lý Admin</div>
      </div>
    </div>

    <div class="error-box" id="error-box">
      <i class="ti ti-circle-x" style="font-size: 14px;"></i>
      <span id="error-msg">Tên đăng nhập hoặc mật khẩu sai.</span>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label class="input-label" for="username">Tài khoản</label>
        <div class="input-wrapper">
          <i class="ti ti-user"></i>
          <input type="text" id="username" placeholder="Nhập tài khoản admin..." required autofocus autocomplete="username">
        </div>
      </div>

      <div class="input-group" style="margin-bottom: 1.5rem;">
        <label class="input-label" for="password">Mật khẩu</label>
        <div class="input-wrapper">
          <i class="ti ti-lock"></i>
          <input type="password" id="password" placeholder="Nhập mật khẩu..." required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btn-text">
        <i class="ti ti-login"></i> Đăng nhập
      </button>
    </form>

    <div class="footer-text">
      BizHub AI v2.0 &middot; Bảo mật hệ thống
    </div>
  </div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const errorBox = document.getElementById('error-box');
  const errorMsg = document.getElementById('error-msg');
  const btn = document.getElementById('btn-text');

  errorBox.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader animate-spin"></i> Đang xác thực...';

  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });

    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || 'Đăng nhập thất bại.');
    }

    // Lưu credentials
    localStorage.setItem('bizhub_admin_token', data.token);
    localStorage.setItem('bizhub_admin_user', JSON.stringify(data.admin));

    // Redirect về trang chủ quản lý
    window.location.href = 'index.html';
  } catch (err) {
    errorMsg.textContent = err.message;
    errorBox.style.display = 'flex';
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i> Đăng nhập';
  }
}
</script>

</body>
</html>
